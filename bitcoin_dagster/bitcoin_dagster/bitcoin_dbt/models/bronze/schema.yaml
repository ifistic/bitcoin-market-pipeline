version: 2

models:
  - name: raw_data
    description: "Bronze layer - raw CoinGecko market data"
    meta:
      owner: data-engineering
      classification: internal
      layer: bronze
    columns:
      - name: ID
        description: "Unique coin identifier"
        tests:
          - not_null
          - unique
      - name: SYMBOL
        description: "Ticker symbol"
        tests:
          - not_null
      - name: CURRENT_PRICE
        description: "Current price in USD"
        tests:
          - not_null
      - name: MARKET_CAP
        description: "Market capitalisation in USD"
        tests:
          - not_null
      - name: LOAD_TIME
        description: "UTC ingestion timestamp"
        tests:
          - not_null

  - name: incremental_raw
    description: "Bronze layer - incremental load of raw data"
    meta:
      owner: data-engineering
      classification: internal
      layer: bronze
    columns:
      - name: ID
        tests:
          - not_null
      - name: CURRENT_PRICE
        tests:
          - not_null
