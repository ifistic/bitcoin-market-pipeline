version: 2

models:
  - name: silver_crypto
    description: "Silver layer - cleaned and standardised crypto data"
    meta:
      owner: data-engineering
      classification: internal
      layer: silver
    columns:
      - name: ID
        description: "Unique coin identifier"
        tests:
          - not_null
          - unique
      - name: SYMBOL
        tests:
          - not_null
      - name: CURRENT_PRICE
        tests:
          - not_null

  - name: candles
    description: "Silver layer - OHLC candlestick data"
    meta:
      owner: data-engineering
      classification: internal
      layer: silver
